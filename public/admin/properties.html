<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Imobiliária | Imóveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="../assets/top-imobiliaria/icon-square.jpg" alt="Top Imobiliária">
        <div>
          <strong>Top Imobiliária</strong>
          <span>Painel administrativo</span>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="./dashboard.html">Dashboard</a>
        <a class="active" href="./properties.html">Imóveis</a>
        <a href="./add-property.html">Adicionar imóvel</a>
        <a href="./help.html">Como cadastrar</a>
        <a href="../index.html" target="_blank" rel="noreferrer">Ver site público</a>
        <button type="button" data-action="logout">Sair</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <h1>Imóveis</h1>
          <p>Gerencie toda a base usada no site público.</p>
        </div>
        <div class="admin-actions">
          <a class="btn btn-primary" href="./add-property.html">Adicionar imóvel</a>
        </div>
      </header>

      <div id="propertiesMessage" class="message"></div>

      <section class="panel">
        <form id="filtersForm" class="toolbar">
          <div class="filters">
            <div class="field">
              <label for="filterSearch">Busca</label>
              <input id="filterSearch" type="search" placeholder="Título, endereço, condomínio">
            </div>
            <div class="field">
              <label for="filterListingType">Negócio</label>
              <select id="filterListingType">
                <option value="">Todos</option>
                <option value="aluguel">Aluguel</option>
                <option value="venda">Venda</option>
              </select>
            </div>
            <div class="field">
              <label for="filterStatus">Status</label>
              <select id="filterStatus">
                <option value="">Todos</option>
                <option value="active">Ativo</option>
                <option value="inactive">Inativo</option>
              </select>
            </div>
          </div>
          <div class="admin-actions">
            <button class="btn btn-secondary" type="button" id="clearFilters">Limpar</button>
            <button class="btn btn-primary" type="submit">Aplicar filtros</button>
          </div>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Imóvel</th>
                <th>Negócio</th>
                <th>Tipo</th>
                <th>Preço</th>
                <th>Região</th>
                <th>Fotos</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="propertiesTableBody">
              <tr>
                <td colspan="7">
                  <div class="loading-inline">Carregando imóveis...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="../assets/top-imobiliaria/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./api.js"></script>
  <script src="./properties.js"></script>
</body>
</html>
